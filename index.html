<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Lista de Compras v02</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#f7f6f2; --surface:#ffffff; --border:#e8e5dd; --border2:#d4d0c8;
  --text:#1a1a18; --text2:#6b6860; --text3:#aba89f;
  --green:#2d7a4f; --green-bg:#edf7f2; --green-bd:#b8deca;
  --red:#c0392b; --red-bg:#fdf2f1;
  --amber:#b8750a; --amber-bg:#fdf6e8;
  --radius:14px; --radius-sm:9px;
}
html,body { height:100%; background:var(--bg); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text); }
.app { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; }
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:52px 20px 16px; flex-shrink:0; }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; }
.header h1 { font-size:22px; font-weight:600; }
.header p  { font-size:13px; color:var(--text3); margin-top:2px; }
.header-actions { display:flex; gap:6px; }
.hbtn { height:34px; padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--bg); color:var(--text2); font-family:inherit; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:5px; transition:background .15s; }
.hbtn:active { background:var(--border); }
.hbtn svg { width:15px; height:15px; }
.sync-bar { display:flex; align-items:center; gap:6px; padding:6px 20px; font-size:12px; color:var(--text3); background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; transition:background .3s; }
.sync-dot.online  { background:#2d7a4f; }
.sync-dot.offline { background:#c0392b; }
.stats { display:flex; gap:8px; padding:12px 20px; flex-shrink:0; }
.stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; text-align:center; }
.stat-n { font-size:20px; font-weight:600; }
.stat-l { font-size:11px; color:var(--text3); margin-top:1px; }
.mic-area { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; flex-shrink:0; }
.mic-row { display:flex; gap:10px; align-items:center; }
.mic-btn { width:56px; height:56px; border-radius:50%; border:1.5px solid var(--border2); background:var(--bg); color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
.mic-btn svg { width:24px; height:24px; }
.mic-btn.recording { background:var(--green-bg); border-color:var(--green-bd); color:var(--green); animation:pulse 1.3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(45,122,79,.25)} 50%{box-shadow:0 0 0 8px rgba(45,122,79,0)} }
.mic-info { flex:1; }
.mic-status { font-size:13px; font-weight:500; color:var(--text2); }
.mic-status.on { color:var(--green); }
.live-text { font-size:14px; margin-top:4px; min-height:20px; font-style:italic; color:var(--text2); }
.mic-hint { font-size:12px; color:var(--text3); margin-top:6px; }
.manual-row { display:flex; gap:8px; padding:10px 20px 0; flex-shrink:0; }
.manual-row input { flex:1; height:40px; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:0 14px; font-family:inherit; font-size:14px; color:var(--text); outline:none; }
.manual-row input::placeholder { color:var(--text3); }
.manual-row input:focus { border-color:var(--green); }
.add-btn { height:40px; padding:0 16px; background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .15s; }
.add-btn:active { opacity:.85; }
.filter-row { display:flex; gap:6px; padding:10px 20px; flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.filter-btn { height:30px; padding:0 14px; border-radius:99px; border:1px solid var(--border2); background:var(--surface); color:var(--text2); font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; transition:all .15s; }
.filter-btn.active { background:var(--text); color:var(--surface); border-color:var(--text); }
.list-wrap { flex:1; overflow-y:auto; padding:0 20px 32px; -webkit-overflow-scrolling:touch; }
.items-group { display:flex; flex-direction:column; gap:1px; margin-top:16px; }
.empty { text-align:center; padding:48px 20px; color:var(--text3); font-size:14px; line-height:1.8; }
.empty svg { width:44px; height:44px; margin:0 auto 12px; display:block; opacity:.25; }
.item { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; animation:fadeIn .2s ease; }
.item:not(:last-child) { border-bottom-left-radius:0; border-bottom-right-radius:0; border-bottom-color:transparent; }
.item:not(:first-child) { border-top-left-radius:0; border-top-right-radius:0; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.item-num { font-size:12px; font-weight:600; color:var(--text3); min-width:22px; text-align:right; }
.item-check { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border2); background:none; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:transparent; transition:all .2s; }
.item-check.done { background:var(--green); border-color:var(--green); color:#fff; }
.item-check svg { width:13px; height:13px; }
.item-body { flex:1; min-width:0; }
.item-name { font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .2s; }
.item-name.done { color:var(--text3); text-decoration:line-through; }
.item-date { font-size:11px; color:var(--text3); margin-top:2px; }
.item-del { width:30px; height:30px; border-radius:8px; border:none; background:none; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
.item-del:active { background:var(--red-bg); color:var(--red); }
.item-del svg { width:16px; height:16px; }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--text); color:var(--surface); font-size:13px; font-weight:500; padding:10px 20px; border-radius:99px; opacity:0; transition:opacity .2s,transform .2s; pointer-events:none; white-space:nowrap; z-index:100; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.no-support { margin:8px 20px 0; background:var(--amber-bg); border:1px solid #f0d090; border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; color:var(--amber); display:none; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <h1>🛒 Lista de Compras <small style="font-size:13px;font-weight:400;color:var(--text3)">v02</small></h1>
        <p id="dateLabel"></p>
      </div>
      <div class="header-actions">
        <button class="hbtn" onclick="exportList()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar
        </button>
        <button class="hbtn" onclick="clearDone()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Limpar ✓
        </button>
      </div>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Conectando...</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="statTotal">0</div><div class="stat-l">itens</div></div>
    <div class="stat"><div class="stat-n" id="statPend">0</div><div class="stat-l">pendentes</div></div>
    <div class="stat"><div class="stat-n" id="statDone">0</div><div class="stat-l">marcados</div></div>
  </div>

  <div class="mic-area">
    <div class="mic-row">
      <button class="mic-btn" id="micBtn" onclick="toggleRec()" aria-label="Gravar item">
        <svg id="icoMic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
        <svg id="icoStop" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <div class="mic-info">
        <div class="mic-status" id="micStatus">Toque para falar o item</div>
        <div class="live-text" id="liveText">ex: "leite", "arroz", "detergente"</div>
      </div>
    </div>
    <div class="mic-hint" id="micHint">💡 Fale um item de cada vez. Ele será adicionado automaticamente.</div>
  </div>
  <div class="no-support" id="noSupport">⚠️ Reconhecimento de voz não disponível. Use o campo manual abaixo.</div>

  <div class="manual-row">
    <input type="text" id="manualInput" placeholder="Ou digite o item aqui..." maxlength="60" onkeydown="if(event.key==='Enter') addManual()">
    <button class="add-btn" onclick="addManual()">+ Adicionar</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" id="f-all"  onclick="setFilter('all')">Todos</button>
    <button class="filter-btn"        id="f-pend" onclick="setFilter('pend')">Pendentes</button>
    <button class="filter-btn"        id="f-done" onclick="setFilter('done')">Marcados</button>
  </div>

  <div class="list-wrap" id="listWrap"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_AwMF352zv_T_zZs6CPh55TL3cR1AJkM",
  authDomain: "compras-fb4e1.firebaseapp.com",
  databaseURL: "https://compras-fb4e1-default-rtdb.firebaseio.com",
  projectId: "compras-fb4e1",
  storageBucket: "compras-fb4e1.firebasestorage.app",
  messagingSenderId: "912326717715",
  appId: "1:912326717715:web:00bbcd7728cd07c6cc2ae6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const listRef = db.ref('lista');

let items = {};
let filter = 'all';
let recognition = null;
let isRec = false;
let interim = '';

document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });

/* conexão */
db.ref('.info/connected').on('value', snap => {
  const on = snap.val() === true;
  document.getElementById('syncDot').className = 'sync-dot ' + (on ? 'online' : 'offline');
  document.getElementById('syncLabel').textContent = on
    ? 'Sincronizado em tempo real ✓'
    : 'Sem conexão — aguardando...';
});

/* escuta o banco em tempo real */
listRef.on('value', snap => {
  items = snap.val() || {};
  render();
});

/* adicionar */
function addItem(name) {
  name = name.trim().toLowerCase().replace(/^\w/, c => c.toUpperCase());
  if (!name) return;
  const existe = Object.values(items).find(i => i.name.toLowerCase() === name.toLowerCase());
  if (existe) { toast('Já está na lista: ' + name); return; }
  const now = new Date();
  listRef.child('item_' + Date.now()).set({
    name,
    done: false,
    date: now.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' }),
    time: now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
  });
  toast('Adicionado: ' + name);
}

function addManual() {
  const inp = document.getElementById('manualInput');
  addItem(inp.value);
  inp.value = '';
}

function toggleDone(id) {
  listRef.child(id).update({ done: !items[id].done });
}

function deleteItem(id) {
  listRef.child(id).remove();
}

function clearDone() {
  const dones = Object.entries(items).filter(([,v]) => v.done);
  if (!dones.length) { toast('Nenhum item marcado'); return; }
  if (!confirm('Remover ' + dones.length + ' item(s) marcado(s)?')) return;
  const upd = {};
  dones.forEach(([k]) => upd[k] = null);
  listRef.update(upd);
  toast(dones.length + ' item(s) removido(s)');
}

function setFilter(f) {
  filter = f;
  ['all','pend','done'].forEach(k =>
    document.getElementById('f-'+k).classList.toggle('active', k === f));
  render();
}

function render() {
  const all = Object.entries(items).map(([id,v]) => ({id,...v}));
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statPend').textContent  = all.filter(i => !i.done).length;
  document.getElementById('statDone').textContent  = all.filter(i =>  i.done).length;

  const visible = all
    .filter(i => filter==='all' ? true : filter==='pend' ? !i.done : i.done)
    .sort((a,b) => a.name.localeCompare(b.name,'pt-BR'));

  const wrap = document.getElementById('listWrap');
  if (!visible.length) {
    wrap.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      ${filter==='all'?'Nenhum item ainda.<br>Fale ou digite para adicionar.':filter==='pend'?'Nenhum item pendente.':'Nenhum item marcado.'}
    </div>`;
    return;
  }

  wrap.innerHTML = `<div class="items-group">${visible.map((it,idx) => `
    <div class="item">
      <span class="item-num">${idx+1}</span>
      <button class="item-check ${it.done?'done':''}" onclick="toggleDone('${it.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="item-body">
        <div class="item-name ${it.done?'done':''}">${esc(it.name)}</div>
        <div class="item-date">adicionado ${it.date} às ${it.time}</div>
      </div>
      <button class="item-del" onclick="deleteItem('${it.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('')}</div>`;
}

function exportList() {
  const all = Object.values(items);
  if (!all.length) { toast('Lista vazia'); return; }
  const sorted = [...all].sort((a,b) => a.name.localeCompare(b.name,'pt-BR'));
  const txt = `LISTA DE COMPRAS — ${new Date().toLocaleDateString('pt-BR')}\n\n`
    + sorted.map((it,i) => `${i+1}. [${it.done?'X':' '}] ${it.name}  (adicionado ${it.date})`).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = 'lista_compras_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}

let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---- voz ---- */
// Função que processa o texto recebido:
// separa por vírgula OU adiciona sozinho após pausa
let pauseTimer = null;
const PAUSA_MS = 1800; // tempo de silêncio para adicionar automaticamente

function processarFala(texto) {
  // Se tiver vírgula, separa em múltiplos itens
  if (texto.includes(',')) {
    const partes = texto.split(',').map(p => p.trim()).filter(Boolean);
    partes.forEach(p => addItem(p));
    document.getElementById('liveText').textContent = '✓ ' + partes.length + ' itens adicionados!';
  } else {
    addItem(texto);
  }
}

function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('noSupport').style.display = 'block';
    document.getElementById('micBtn').style.opacity = '0.4';
    document.getElementById('micBtn').style.pointerEvents = 'none';
    return;
  }
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;   // fica ouvindo continuamente
  recognition.interimResults = true;

  recognition.onresult = ev => {
    let fin='', intr='';
    for (let i=ev.resultIndex; i<ev.results.length; i++)
      ev.results[i].isFinal ? fin+=ev.results[i][0].transcript : intr+=ev.results[i][0].transcript;

    // Mostra o que está sendo reconhecido
    document.getElementById('liveText').textContent = (fin || intr).trim();

    if (fin.trim()) {
      interim += (interim ? ' ' : '') + fin.trim();

      // Reinicia o timer de pausa a cada palavra final recebida
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        if (interim.trim()) {
          processarFala(interim.trim());
          interim = '';
          document.getElementById('liveText').textContent = '';
        }
      }, PAUSA_MS);
    }
  };

  recognition.onend = () => {
    // Se ainda tiver texto pendente ao parar, adiciona
    clearTimeout(pauseTimer);
    if (interim.trim()) { processarFala(interim.trim()); interim = ''; }
    if (isRec) {
      // Reinicia automaticamente no Android (continuous às vezes cai)
      try { recognition.start(); } catch {}
    } else {
      stopRecUI();
    }
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech') return; // ignora silêncio
    stopRec();
  };
}

function toggleRec() { isRec ? stopRec() : startRec(); }

function startRec() {
  if (!recognition) return;
  interim=''; isRec=true;
  clearTimeout(pauseTimer);
  try { recognition.start(); } catch {}
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('icoMic').style.display='none';
  document.getElementById('icoStop').style.display='block';
  document.getElementById('micStatus').textContent='● Ouvindo...';
  document.getElementById('micStatus').className='mic-status on';
  document.getElementById('liveText').textContent='';
  document.getElementById('micHint').textContent='🎙️ Fale um item, pause. Ou: "leite, arroz, feijão"';
}

function stopRec() {
  isRec=false;
  clearTimeout(pauseTimer);
  if (interim.trim()) { processarFala(interim.trim()); interim=''; }
  try { recognition.stop(); } catch {}
  stopRecUI();
}

function stopRecUI() {
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('icoMic').style.display='block';
  document.getElementById('icoStop').style.display='none';
  document.getElementById('micStatus').textContent='Toque para falar';
  document.getElementById('micStatus').className='mic-status';
  document.getElementById('liveText').textContent='ex: "leite" ou "leite, arroz, feijão"';
  document.getElementById('micHint').textContent='💡 Pause entre itens ou separe por vírgula para adicionar vários.';
}

setupSpeech();
</script>
</body>
</html>
